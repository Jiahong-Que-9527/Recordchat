- id: ne_one_repo_and_docs
  name: NE:ONE repository and implementation documents
  publisher: Open Logistics Foundation
  source_url: https://git.openlogisticsfoundation.org/wg-digitalaircargo/ne-one
  access_method: git_clone_plus_public_web_download
  access_date: 2026-06-07
  license: Open Logistics Foundation License 1.3
  allowed_use:
    - retrieval
    - citation
    - educational_demo
    - internal_normalization
  restrictions:
    - retain_license_notice
    - avoid_bulk_ingest_of_entire_codebase
  pii_risk: low
  commercial_risk: low
  final_destinations:
    - data/raw/one_record_docs/ne_one/
    - data/raw/api_specs/ne_one/
    - data/raw/examples/ne_one/
    - data/raw/notes/implementation_notes/
  batches:
    - batch_id: ne_one_docs_extract
      source_path: data/raw/_staging/ne_one_implementation_materials/docs/
      final_destination: data/raw/one_record_docs/ne_one/
      material_types:
        - markdown_docs
      normalization:
        - extract_selected_docs
        - exclude_bulk_java_source
      license_basis: repo_license
    - batch_id: ne_one_repo_readme_and_changelog
      source_path: data/raw/_staging/ne_one_implementation_materials/gitlab_repo/
      final_destination: data/raw/one_record_docs/ne_one/
      material_types:
        - markdown_docs
      normalization:
        - copy_readme_and_changelog_only
      license_basis: repo_license
    - batch_id: ne_one_api_config_extract
      source_path: data/raw/_staging/ne_one_implementation_materials/api_config/
      final_destination: data/raw/api_specs/ne_one/
      material_types:
        - config_files
        - ontologies
        - example_requests
      normalization:
        - extract_config_and_api_support_assets
      license_basis: repo_license
    - batch_id: ne_one_examples_extract
      source_path: data/raw/_staging/ne_one_implementation_materials/example_payloads/
      final_destination: data/raw/examples/ne_one/
      material_types:
        - json_examples
        - csv_support_files
      normalization:
        - extract_example_payloads
      license_basis: repo_license
    - batch_id: ne_one_source_notes
      source_path: data/raw/_staging/ne_one_implementation_materials/SOURCE_URLS.md
      final_destination: data/raw/one_record_docs/ne_one/sources.md
      material_types:
        - source_notes
      normalization:
        - preserve_provenance_notes
      license_basis: internal_project_note

- id: manual_iata_and_community_pages
  name: IATA overview pages, PDFs, and community narrative captures
  publisher: mixed
  source_url: mixed_manual_sources
  access_method: manual_download
  access_date: 2026-06-07
  license: mixed_or_unclear
  allowed_use:
    - citation
    - internal_review
    - selective_normalization
  restrictions:
    - do_not_assume_free_redistribution
    - review_source_terms_before_public_release
    - keep_as_citation_first_material
  pii_risk: low
  commercial_risk: medium
  final_destinations:
    - data/raw/one_record_docs/overview/
    - data/raw/one_record_docs/pdfs/
    - data/raw/notes/domain_glossary/
    - data/raw/notes/community_resources/
    - data/raw/examples/community/
  batches:
    - batch_id: iata_overview_and_pdf_captures
      source_path: data/raw/_staging/iata_business_materials/
      final_destination: data/raw/one_record_docs/overview/
      material_types:
        - html_captures
        - pdf_captures
      normalization:
        - convert_to_markdown_or_text_before_ingest
      license_basis: mixed_or_unclear
    - batch_id: community_narrative_materials
      source_path: data/raw/_staging/community_narrative_addons/
      final_destination: data/raw/notes/community_resources/
      material_types:
        - html_captures
        - markdown_notes
        - json_examples
      normalization:
        - selective_normalization_only
      license_basis: mixed_or_source_specific
