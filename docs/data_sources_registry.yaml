- id: official_one_record_repo
  name: IATA-Cargo ONE Record repository
  publisher: IATA-Cargo
  source_url: https://github.com/IATA-Cargo/ONE-Record
  access_method: git_clone
  access_date: 2026-06-07
  license: MIT
  allowed_use:
    - retrieval
    - citation
    - educational_demo
    - internal_normalization
  restrictions:
    - retain_license_notice
    - avoid_bulk_republication_of_raw_bundle
    - do_not_claim_official_iata_affiliation
  pii_risk: low
  commercial_risk: low
  final_destinations:
    - data/raw/one_record_docs/spec_development/
    - data/raw/one_record_docs/spec_2025_07/
    - data/raw/one_record_docs/spec_2023_12/
    - data/raw/ontology/official/
    - data/raw/examples/official/
  batches:
    - batch_id: one_record_docs_development_repo_extract
      source_path: data/raw/_staging/ONE-Record/Documentation_website/docs/
      final_destination: data/raw/one_record_docs/spec_development/
      material_types:
        - markdown_docs
      normalization:
        - copy_selected_docs
        - keep_markdown_format
      license_basis: repository_license
    - batch_id: one_record_docs_2025_07_repo_release
      source_path: data/raw/_staging/ONE-Record/2025-07-standard/
      final_destination: data/raw/one_record_docs/spec_2025_07/repo_release/
      material_types:
        - markdown_docs
        - ontology_ttl
      normalization:
        - copy_release_subset
      license_basis: repository_license
    - batch_id: one_record_ontology_working_draft_repo_extract
      source_path: data/raw/_staging/ONE-Record/working_draft/ontology/
      final_destination: data/raw/ontology/official/one_record_data_model.working_draft.ttl
      material_types:
        - ontology_ttl
      normalization:
        - copy_selected_ontology_file
      license_basis: repository_license
    - batch_id: one_record_ontology_2025_07_repo_extract
      source_path: data/raw/_staging/ONE-Record/2025-07-standard/Data-Model/
      final_destination: data/raw/ontology/official/one_record_data_model.2025-07.ttl
      material_types:
        - ontology_ttl
      normalization:
        - copy_selected_ontology_file
      license_basis: repository_license
    - batch_id: one_record_ontology_2023_12_repo_extract
      source_path: data/raw/_staging/ONE-Record/2023-12-standard/Data-Model/
      final_destination: data/raw/ontology/official/one_record_data_model.2023-12.ttl
      material_types:
        - ontology_ttl
      normalization:
        - copy_selected_ontology_file
      license_basis: repository_license
    - batch_id: one_record_docs_2023_12_repo_release
      source_path: data/raw/_staging/ONE-Record/2023-12-standard/
      final_destination: data/raw/one_record_docs/spec_2023_12/repo_release/
      material_types:
        - markdown_docs
        - ontology_ttl
      normalization:
        - copy_release_subset
      license_basis: repository_license

- id: official_one_record_ontology_pages
  name: IATA ONE Record ontology and vocabulary pages
  publisher: IATA
  source_url: https://onerecord.iata.org/ns/api
  access_method: public_web_download
  access_date: 2026-06-07
  license: unknown_or_not_explicit_on_page
  allowed_use:
    - retrieval
    - citation
    - internal_normalization
  restrictions:
    - treat_as_citation_first_reference_material
    - review_before_public_redistribution
    - do_not_claim_official_iata_affiliation
  pii_risk: low
  commercial_risk: medium
  final_destinations:
    - data/raw/ontology/official/
  batches:
    - batch_id: one_record_api_ontology_namespace_download
      source_path: data/raw/_staging/iata_onerecord_ontology_vocab_pages/ns_api/
      final_destination: data/raw/ontology/official/
      material_types:
        - ttl
        - owl
        - jsonld
      normalization:
        - copy_current_api_ontology_serializations
      license_basis: source_page_not_explicit
    - batch_id: ontology_source_notes
      source_path: data/raw/_staging/iata_onerecord_ontology_vocab_pages/SOURCE_URLS.md
      final_destination: data/raw/ontology/official/ontology_sources.md
      material_types:
        - source_notes
      normalization:
        - preserve_provenance_notes
      license_basis: internal_project_note

