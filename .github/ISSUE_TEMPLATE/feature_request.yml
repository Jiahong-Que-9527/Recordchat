name: Feature request
description: Propose a new capability or improvement for RecordChat
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and how it fits the ONE Record RAG assistant scope.
        See [SPEC.md](../../SPEC.md) and [docs/roadmap.md](../../docs/roadmap.md) for current direction.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - RAG / retrieval quality
        - Domain model (JSON-LD, relationships)
        - Chat UX
        - Ingestion / knowledge base
        - Evaluation / observability
        - Platform integration (RecordForge, AviationLakehouse)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or developer pain does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should RecordChat behave after this change?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why they were not chosen.
    validations:
      required: false

  - type: checkboxes
    id: acceptance
    attributes:
      label: Acceptance hints
      options:
        - label: Includes eval question(s) or test updates in data/eval or backend/tests
        - label: Requires SPEC.md or architecture doc update
        - label: Backward compatible with offline (no API key) mode
